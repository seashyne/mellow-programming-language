name: core-tests

on:
  push:
  pull_request:

jobs:
  stable:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev]
      - name: Core language
        run: pytest -q tests/core/test_core_language.py -p no:cacheprovider
      - name: Core syntax reference
        run: pytest -q tests/core/test_syntax_reference.py -p no:cacheprovider
      - name: Core language specification
        run: pytest -q tests/core/test_language_spec_2_9.py -p no:cacheprovider
      - name: Core data processing
        run: pytest -q tests/core/test_data_processing_core.py -p no:cacheprovider
      - name: Core money and finance sandbox
        run: pytest -q tests/core/test_money_and_finance_sandbox.py -p no:cacheprovider
      - name: Core ledger
        run: pytest -q tests/core/test_ledger_core.py -p no:cacheprovider
      - name: Core SDK
        run: pytest -q tests/core/test_sdk_core.py -p no:cacheprovider
      - name: Core interop
        run: pytest -q tests/core/test_interop_core.py -p no:cacheprovider
      - name: Run stable language gate
        run: pytest -q tests/language -p no:cacheprovider
      - name: Run package registry smoke
        run: |
          pytest -q \
            tests/test_v152_online_registry.py \
            tests/test_v153_public_registry.py \
            tests/test_v154_cli_registry.py \
            tests/test_v157_core_packages.py \
            tests/test_v158_lockfile.py \
            tests/test_v159_runtime_and_imports.py \
            tests/test_v215_package_runtime_integration.py \
            tests/test_v216_project_templates.py \
            -p no:cacheprovider

  native:
    runs-on: ubuntu-latest
    needs: stable
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev]
      - name: Verify native extension
        run: |
          python -c "import mellowlang._mellowvm"
      - name: Run native parity tests
        run: |
          pytest -q tests/native frameworks/mellow_ui/tests -p no:cacheprovider

  native-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ARM64 toolchain and emulator
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user
      - name: Cross-build standalone ARM64 runtime
        run: |
          cmake -S native/standalone -B build/standalone-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
          cmake --build build/standalone-arm64 --parallel 2
      - name: Run ARM64 runtime under QEMU
        run: |
          qemu-aarch64 -L /usr/aarch64-linux-gnu \
            build/standalone-arm64/mellow --runtime-info | tee arm64-runtime.json
          grep -q '"architecture":"arm64"' arm64-runtime.json
          grep -q '"backend":"generic-c"' arm64-runtime.json
          qemu-aarch64 -L /usr/aarch64-linux-gnu \
            build/standalone-arm64/mellow tests/fixtures/full_native_core.mellow

  package-release-gate:
    runs-on: ubuntu-latest
    needs: stable
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev,security]
      - name: Run package tests
        run: |
          pytest -q \
            tests/test_v152_online_registry.py \
            tests/test_v153_public_registry.py \
            tests/test_v154_cli_registry.py \
            tests/test_v157_core_packages.py \
            tests/test_v158_lockfile.py \
            tests/test_v215_package_runtime_integration.py \
            -p no:cacheprovider
      - name: Run package release gate
        run: python scripts/package_release_gate.py
