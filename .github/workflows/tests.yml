name: core-tests

on:
  push:
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev]
      - name: Verify native extension
        run: |
          python -c "import mellowlang._mellowvm"
      - name: Run stable core and native parity tests
        run: |
          pytest -q tests/core tests/native frameworks/mellow_ui/tests -p no:cacheprovider
