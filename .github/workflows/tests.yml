name: core-tests

on:
  push:
  pull_request:

jobs:
  stable:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev]
      - name: Run stable language gate
        run: |
          pytest -q tests/core -p no:cacheprovider
          if [ -d tests/language ]; then
            pytest -q tests/language -p no:cacheprovider
          fi
      - name: Run package registry smoke
        run: |
          pytest -q \
            tests/test_v152_online_registry.py \
            tests/test_v153_public_registry.py \
            tests/test_v154_cli_registry.py \
            tests/test_v157_core_packages.py \
            tests/test_v158_lockfile.py \
            tests/test_v159_runtime_and_imports.py \
            tests/test_v215_package_runtime_integration.py \
            tests/test_v216_project_templates.py \
            -p no:cacheprovider

  native:
    runs-on: ubuntu-latest
    needs: stable
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev]
      - name: Verify native extension
        run: |
          python -c "import mellowlang._mellowvm"
      - name: Run native parity tests
        run: |
          pytest -q tests/native frameworks/mellow_ui/tests -p no:cacheprovider

  package-release-gate:
    runs-on: ubuntu-latest
    needs: stable
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev,security]
      - name: Run package tests
        run: |
          pytest -q \
            tests/test_v152_online_registry.py \
            tests/test_v153_public_registry.py \
            tests/test_v154_cli_registry.py \
            tests/test_v157_core_packages.py \
            tests/test_v158_lockfile.py \
            tests/test_v215_package_runtime_integration.py \
            -p no:cacheprovider
      - name: Run package release gate
        run: python scripts/package_release_gate.py
