name: core-tests

on:
  push:
  pull_request:

jobs:
  tooling-reference:
    runs-on: ubuntu-latest
    env:
      MELLOW_NO_EXT: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev]
      - name: Run reference core gate
        run: pytest -q tests/core -p no:cacheprovider
      - name: Run reference language gate
        run: pytest -q tests/language -p no:cacheprovider
      - name: Run package registry smoke
        run: |
          pytest -q \
            tests/test_v152_online_registry.py \
            tests/test_v153_public_registry.py \
            tests/test_v154_cli_registry.py \
            tests/test_v157_core_packages.py \
            tests/test_v158_lockfile.py \
            tests/test_v159_runtime_and_imports.py \
            tests/test_v215_package_runtime_integration.py \
            tests/test_v216_project_templates.py \
            -p no:cacheprovider

  native-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build native x64 runtime
        run: |
          cmake -S native/standalone -B build/standalone-x64 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/standalone-x64 --parallel 2
      - name: Run native x64 C tests
        run: ctest --test-dir build/standalone-x64 --output-on-failure
      - name: Verify native x64 platform and language core
        run: |
          build/standalone-x64/mellow --runtime-info | tee x64-runtime.json
          grep -q '"architecture":"x86_64"' x64-runtime.json
          grep -q '"backend":"generic-c"' x64-runtime.json
          build/standalone-x64/mellow tests/fixtures/full_native_core.mellow \
            | tee x64-core.out
          diff -u tests/fixtures/full_native_core.expected x64-core.out
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev]
      - name: Verify native extension
        run: |
          python -c "import mellowlang._mellowvm"
      - name: Run native core parity
        run: pytest -q tests/native/test_native_core_parity.py -p no:cacheprovider
      - name: Run native stdlib parity
        run: pytest -q tests/native/test_native_stdlib_parity.py -p no:cacheprovider
      - name: Run standalone C CLI tests
        run: pytest -q tests/native/test_full_native_c_cli.py -p no:cacheprovider
      - name: Run native architecture contracts
        run: pytest -q tests/native/test_arm_runtime_contract.py -p no:cacheprovider
      - name: Run Mellow UI framework tests
        run: pytest -q frameworks/mellow_ui/tests -p no:cacheprovider

  native-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ARM64 toolchain and emulator
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user
      - name: Cross-build standalone ARM64 runtime
        run: |
          cmake -S native/standalone -B build/standalone-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
          cmake --build build/standalone-arm64 --parallel 2
      - name: Verify native ARM64 platform and language core
        run: |
          qemu-aarch64 -L /usr/aarch64-linux-gnu \
            build/standalone-arm64/mellow --runtime-info | tee arm64-runtime.json
          grep -q '"architecture":"arm64"' arm64-runtime.json
          grep -q '"backend":"generic-c"' arm64-runtime.json
          qemu-aarch64 -L /usr/aarch64-linux-gnu \
            build/standalone-arm64/mellow tests/fixtures/full_native_core.mellow \
            | tee arm64-core.out
          diff -u tests/fixtures/full_native_core.expected arm64-core.out

  package-release-gate:
    runs-on: ubuntu-latest
    needs: [native-x64, native-arm64, tooling-reference]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install release dependencies
        env:
          MELLOW_NO_EXT: "1"
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev,security]
      - name: Run package tests
        run: |
          pytest -q \
            tests/test_v152_online_registry.py \
            tests/test_v153_public_registry.py \
            tests/test_v154_cli_registry.py \
            tests/test_v157_core_packages.py \
            tests/test_v158_lockfile.py \
            tests/test_v215_package_runtime_integration.py \
            -p no:cacheprovider
      - name: Run package release gate
        run: python scripts/package_release_gate.py
